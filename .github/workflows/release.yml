name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    uses: godaddy/libenclaveapp/.github/workflows/reusable-release.yml@main
    with:
      app_name: sso-jwt
      targets: '["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu", "aarch64-pc-windows-msvc", "x86_64-unknown-linux-musl"]'
      linux_deps: "libdbus-1-dev pkg-config"
      unix_binaries: "sso-jwt"
      windows_binaries: "sso-jwt.exe sso-jwt-tpm-bridge.exe"
      wix_file: "installer/sso-jwt.wxs"
      homebrew: '{"tap_repo":"godaddy/homebrew-sso-jwt","formula_class":"SsoJwt","description":"SSO JWT CLI with hardware-backed secure caching"}'
      scoop: '{"bucket_repo":"godaddy/scoop-sso-jwt","description":"SSO JWT with hardware-backed caching (Windows TPM 2.0)","has_winget":true}'
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      SCOOP_BUCKET_TOKEN: ${{ secrets.SCOOP_BUCKET_TOKEN }}
