ShortDescription: SSO JWT CLI with hardware-backed secure caching using Secure Enclave and TPM 2.0
Description: |-
  sso-jwt obtains and caches OAuth JWTs with hardware-backed encryption.
  Tokens are encrypted at rest using the Secure Enclave (macOS) or TPM 2.0
  (Windows), proactively refreshed before expiration, and never written to
  disk as plaintext. Supports configurable server profiles, shell integration
  for export detection, and automatic WSL distribution setup.
